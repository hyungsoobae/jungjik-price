<nav th:fragment="header" class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/products">
            <span class="text-primary">JUNG</span>JIK
        </a>

        <form class="header-search-form" id="header-search-form">
            <select id="header-source" class="header-select">
                <option value="">전체</option>
                <option value="MUSINSA">무신사</option>
            </select>
            <input id="header-search" class="header-search-input" type="text" placeholder="상품명을 입력하세요">
            <button type="submit" class="header-search-btn">검색</button>
        </form>
    </div>
</nav>

<script>
    document.getElementById('header-search-form').addEventListener('submit', (e) => {
        debugger;
        e.preventDefault();
        const keyword = document.getElementById('header-search').value.trim();
        const source = document.getElementById('header-source').value;
        const params = new URLSearchParams();
        if (keyword) {
            params.set('keyword', keyword);
        }
        if (source) {
            params.set('source', source);
        }
        window.location.href = `/products${params.toString() ? '?' + params.toString() : ''}`;
    });
</script>
