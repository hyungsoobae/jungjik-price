version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jungjik-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jungjik
      POSTGRES_USER: jungjik
      POSTGRES_PASSWORD: jungjik
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
